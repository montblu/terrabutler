name: Lint GO Code
description: Run golangci-lint

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        args: --config=.github/lint/golangci.yaml
