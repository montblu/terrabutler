name: Publish Docs
description: Run mkdocs and publish

inputs:
  token:
    description: Github token
    required: true

runs:
  using: composite
  steps:
    - name: Deploy docs
      uses: mhausenblas/mkdocs-deploy-gh-pages@master
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        CUSTOM_DOMAIN: docs.montblu.eu
