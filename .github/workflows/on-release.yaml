name: On release

on:
  push:
    tags:
      - v*

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint
        uses: ./.github/actions/lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test
        uses: ./.github/actions/test

  release-binaries:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Release
        uses: ./.github/actions/goreleaser
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
