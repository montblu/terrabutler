name: On merge to Master

on:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint
        uses: ./.github/actions/lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test
        uses: ./.github/actions/test

  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6

      - name: Deploy docs
        uses: ./.github/actions/mkdocs
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
